<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="Omniverse Client">
    <meta property="og:description" content="u get all skins for free download it!!!!!">
    <meta property="og:url" content="https://xliam.xyz/omniverse">
    <meta property="og:type" content="website">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <title>omniverse</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--black);
            color: var(--white);
            display: flex;
            align-items: center;
            text-align: center;
            flex-direction: column;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            justify-content: flex-start;

        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }

        :root {
            --black: #1e1e2e;
            --black2: #3a3a58;
            --white: #b4befe;
            --gray-light: #9ca3af;
            --gray-dark: rgba(58, 29, 41, 0.4);
            --gray-border: #374151;
            --gray-bg: rgba(17, 17, 17, 0.4);
            --accent: #b4befe;
        }


        h1 {
            font-size: 200px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 20px;
            width: 100%;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        h1:hover {
            color: #c3cbff;
            transform: translateY(-2px);
        }

        h2 {
            color: var(--white);
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        input,
        button {
            font-family: inherit;
            font-size: 1rem;
            border-radius: 8px;
        }

        input {
            width: calc(100% - 110px);
            padding: 10px;
            border: 1px solid var(--gray-border);
            background: var(--gray-dark);
            color: var(--white);
        }

        input:focus {
            outline: none;
            border-color: var(--white);
        }

        .button {
            background: var(--white);
            color: var(--black);
            padding: 10px 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px var(--white);
            transition: background 0.2s ease;
        }

        .button:hover {
            background: var(--black);
            color: var(--white);
            border: 10px #c3cbff;
        }

        .gallery {
    width: 90%;
    max-width: 1000px;
    margin-top: 40px;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
}

.gallery-grid img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s ease, opacity 0.2s ease;
}

.gallery-grid img:hover {
    transform: scale(1.03);
    opacity: 0.9;
}

/* fullscreen preview */
.img-viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20000;
}

.img-viewer img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
}
    </style>
</head>

<body>

    <body>
        <h1>Omniverse</h1>
        <div id="sidefr">
            <p>A simple, modern, feature rich Deadshot.io client</p>
            <div class="butt">
                <button class="button" id="dlButton">Download Omniverse</button>
                <button class="button" id="whyButton">Why Omniverse?</button>
            </div>
            <div class="gallery">
                <h2>Screenshots</h2>
                <div class="gallery-grid">
                    <img src="omniverse/ss1.png" alt="Screenshot 1">
                </div>
            </div>
        </div>

        <script>
            const playButton = document.getElementById('playButton');
            const dlButton = document.getElementById('dlButton');
            const whyButton = document.getElementById('whyButton');

            dlButton.addEventListener('click', () => {
                window.open("https://github.com/Typhoonz0/omniverse/releases", "_blank");
            });
            whyButton.addEventListener('click', () => {
                const overlay = document.createElement('div');
                Object.assign(overlay.style, {
                    position: 'fixed',
                    top: 0,
                    left: 0,
                    width: '100vw',
                    height: '100vh',
                    background: 'rgba(0,0,0,0.7)',
                    display: 'flex',
                    justifyContent: 'center',
                    alignItems: 'center',
                    zIndex: 10000,
                    overflow: 'auto'
                });

                const popup = document.createElement('div');
                Object.assign(popup.style, {
                    background: '#1e1e2e',
                    padding: '24px',
                    borderRadius: '12px',
                    maxWidth: '600px',
                    width: '90%',
                    color: '#b4befe',
                    display: 'flex',
                    gap: '24px',
                    alignItems: 'flex-start',
                    opacity: 0,
                    transform: 'scale(0.8)',
                    transition: 'all 0.3s ease'
                });

                requestAnimationFrame(() => {
                    popup.style.opacity = 1;
                    popup.style.transform = 'scale(1)';
                });

                const textDiv = document.createElement('div');
                textDiv.style.flex = '1';
                textDiv.innerHTML = `
                <h3>Features</h3>
                <ul style="list-style:none; padding:0; margin:0; line-height:1.6;">
                    <li>Use any skin in the game</li>
                    <li>FPS Booster</li>
                    <li>Keys Overlay</li>
                    <li>Deadshot + PC Stats</li>
                    <li>Gun Skin Swapper</li>
                    <li>Customizable UI</li>
                    <li>Leaderboard Scraper</li>
                    <li>Auto Fullscreen</li>
                    <li>Adblocker</li>
                    <li>Discord RPC</li>
                </ul>
                <h3>Also...</h3>
                <ul style="list-style:none; padding:0; margin:0; line-height:1.6;">
                    <li>Omniverse is actively being maintained</li>
                    <li>Omniverse is lightweight both RAM wise and UI wise</li>
                    <li>I made it so its good (:</li>
                    <li>You've read this far, why not try it?</li>
                </ul>
                `;


                const rightDiv = document.createElement('div');
                rightDiv.style.display = 'flex';
                rightDiv.style.flexDirection = 'column';
                rightDiv.style.alignItems = 'flex-end';
                rightDiv.style.gap = '12px';

                const closeBtn = document.createElement('span');
                closeBtn.textContent = '×';
                Object.assign(closeBtn.style, {
                    cursor: 'pointer',
                    fontWeight: 'bold',
                    fontSize: '1.5rem'
                });

                const img = document.createElement('img');
                img.src = 'omniverse/image.png'; 
                img.alt = 'Preview';
                Object.assign(img.style, {
                    width: '120px',
                    borderRadius: '8px'
                });

                rightDiv.appendChild(closeBtn);
                rightDiv.appendChild(img);


                popup.appendChild(textDiv);
                popup.appendChild(rightDiv);
                overlay.appendChild(popup);
                document.body.appendChild(overlay);

                popup.getBoundingClientRect();

                popup.style.opacity = 1;
                popup.style.transform = 'scale(1)';

                function closePopup() {
                    popup.style.opacity = 0;
                    popup.style.transform = 'scale(0.8)';
                    setTimeout(() => document.body.removeChild(overlay), 300);
                }

                closeBtn.addEventListener('click', closePopup);
                overlay.addEventListener('click', e => {
                    if (e.target === overlay) closePopup();
                });
            });
document.querySelectorAll('.gallery-grid img').forEach(img => {
    img.addEventListener('click', () => {
        const viewer = document.createElement('div');
        viewer.className = 'img-viewer';

        const fullImg = document.createElement('img');
        fullImg.src = img.src;

        viewer.appendChild(fullImg);
        document.body.appendChild(viewer);

        viewer.addEventListener('click', () => {
            document.body.removeChild(viewer);
        });
    });
});
        </script>

</html>
